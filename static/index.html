<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Studio 局域网雷达</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-panel">
            <div class="header-content">
                <div>
                    <h1>Label Studio 雷达探测器</h1>
                    <p class="subtitle">深度扫描局域网，精确定位 Label Studio 服务</p>
                </div>
                <div class="controls">
                    <div class="auto-scan-toggle" style="display:flex; align-items:center; gap:0.4rem; font-size:0.9rem; color: var(--text-muted); margin-right: 1rem;">
                        <label style="cursor:pointer; display:flex; align-items:center; gap:0.3rem;">
                            <input type="checkbox" id="autoScanToggle" checked> 自动轮询:
                        </label>
                        <input type="number" id="scanInterval" value="5" min="1" max="1440" style="width: 48px; background: rgba(13, 17, 23, 0.8); color: var(--text-primary); border: 1px solid var(--panel-border); padding: 0.1rem 0.3rem; border-radius: 4px; outline: none; font-size:0.85rem; text-align:center;">
                        <span style="font-size:0.85rem">分/次</span>
                        <span id="countdownText" style="display:none; color: var(--accent); font-family: monospace; margin-left:0.3rem;">(05:00)</span>
                    </div>
                    <div class="select-wrapper">
                        <select id="subnetSelect">
                            <option value="">正在加载本机网段...</option>
                        </select>
                    </div>
                    <button id="scanBtn" class="btn primary-btn" disabled>
                        <span class="btn-text">开始扫描</span>
                        <div class="loader-spinner"></div>
                    </button>
                </div>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">目标 IP 数</div>
                <div class="stat-value" id="statTotal">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">已扫描完成</div>
                <div class="stat-value" id="statScanned">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">开放端口主机</div>
                <div class="stat-value highlight-warning" id="stat8080">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">发现 Label Studio</div>
                <div class="stat-value highlight-success" id="statLabelStudio">-</div>
            </div>
        </section>

        <div class="progress-container hidden" id="progressContainer">
            <div class="progress-header">
                <span id="progressText">准备就绪...</span>
                <span id="progressPercentage">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <main class="results-area">
            <div class="table-wrapper glass-panel">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>IP 地址</th>
                            <th>开放端口 (8080-8085)</th>
                            <th>Label Studio 服务</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr class="empty-row"><td colspan="4">请选择网段并点击“开始扫描”以探索网络中 8080-8085 端口的服务。</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
